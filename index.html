<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Agency</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: #050505;
      color: white;
    }

    .section {
      padding: 80px 20px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      font-size: 60px;
    }

    h2 {
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #111;
      color: white;
    }

    button {
      padding: 14px;
      border: none;
      background: white;
      color: black;
      border-radius: 999px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="section">
  <h1>Aether Agency</h1>
  <p>Premium video content for brands and modern storytelling.</p>
</div>

<div class="section">
  <h2>Contact</h2>

  <form action="https://formspree.io/f/xreopzvn" method="POST">
    
    <input type="text" name="name" placeholder="Name" required>
    
    <input type="email" name="email" placeholder="Email" required>
    
    <textarea name="message" placeholder="Tell me about your project..." required></textarea>
    
    <button type="submit">Send Message</button>

  </form>

</div>

</body>
</html>
