<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aether Agency</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .overlay {
      position: relative;
      z-index: 2;
      padding: 20px;
    }

    .overlay h1 {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .overlay p {
      color: rgba(255,255,255,0.8);
      max-width: 600px;
      margin: 0 auto;
    }

    .section {
      padding: 80px 20px;
    }
  </style>
</head>

<body>

  <div class="hero">
    <video autoplay muted loop playsinline class="bg-video">
      <source src="video.mp4" type="video/mp4">
    </video>

    <div class="overlay">
      <h1>Aether Agency</h1>
      <p>Cinematic content for weddings, brands, and modern stories.</p>
    </div>
  </div>

  <div class="section">
    <h2>Selected Work</h2>
    <p>Wedding films · Brand content · Photography</p>
  </div>

  <div class="section">
    <h2>Contact</h2>
    <p>hello@aetheragency.com</p>
  </div>

</body>
</html>
